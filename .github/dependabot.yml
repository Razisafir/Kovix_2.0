version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      # Dev/build tools — vulnerabilities in these don't affect production users
      - dependency-name: "electron"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "gulp*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "mocha*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@playwright/test"
        update-types: ["version-update:semver-patch"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "ci(deps)"
