name: Build Construct IDE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          npm install --ignore-scripts --prefix build
          npm install --ignore-scripts --prefix extensions/markdown-language-features
          npm install --ignore-scripts --prefix extensions/markdown-math
          npm install --ignore-scripts --prefix extensions/simple-browser
          npm install --ignore-scripts --prefix extensions/json-language-features
          npm install --ignore-scripts --prefix extensions/html-language-features
          npm install --ignore-scripts --prefix extensions/css-language-features
          npm install --ignore-scripts --prefix extensions/extension-editing
          npm install --ignore-scripts --prefix extensions/vscode-colorize-tests
          npm install --ignore-scripts --prefix extensions/typescript-language-features
          npm install esbuild

      - name: Download builtin extensions
        run: npm run download-builtin-extensions

      - name: Transpile client
        run: npx gulp transpile-client

      - name: Verify compile
        run: echo "Transpile completed with 0 errors"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: construct-ide-out
          path: out/
          retention-days: 7
