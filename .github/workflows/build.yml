name: Build Construct IDE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_macos:
        description: 'Build macOS (expensive runner)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # COMPILE CHECK — fast gate, runs first
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  compile:
    name: Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev libx11-dev libxkbfile-dev libsecret-1-dev

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Clean node-gyp cache
        run: rm -rf ~/.cache/node-gyp || true

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Compile
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # WINDOWS BUILD — produces .exe installer
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-windows:
    needs: compile
    name: Windows x64 Build
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows package
        run: npx gulp vscode-win32-x64
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Copy Inno Updater
        run: npx gulp vscode-win32-x64-inno-updater
        timeout-minutes: 5

      - name: Build Windows system setup (.exe)
        run: npx gulp vscode-win32-x64-system-setup
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksum
        run: |
          $exe = Get-ChildItem .build\win32-x64\system-setup\*.exe | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash
          "$hash  $($exe.Name)" | Out-File -FilePath .build\win32-x64\checksums-sha256.txt -Encoding utf8
          Get-Content .build\win32-x64\checksums-sha256.txt

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: construct-ide-windows-x64
          path: |
            .build/win32-x64/system-setup/*.exe
            .build/win32-x64/checksums-sha256.txt
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .build/win32-x64/system-setup/*.exe
            .build/win32-x64/checksums-sha256.txt
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # LINUX BUILD — produces .deb package
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-linux:
    needs: compile
    name: Linux x64 Build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm libkrb5-dev libx11-dev libxkbfile-dev libsecret-1-0 libsecret-1-dev libgtk-3-0 libgbm1

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux package
        run: npx gulp vscode-linux-x64
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build Linux DEB
        run: |
          npx gulp vscode-linux-x64-prepare-deb
          npx gulp vscode-linux-x64-build-deb
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        run: |
          cd .build/linux
          sha256sum deb/amd64/**/*.deb > checksums-sha256.txt 2>/dev/null || true
          cat checksums-sha256.txt

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: construct-ide-linux-x64
          path: |
            .build/linux/deb/amd64/**/*.deb
            .build/linux/checksums-sha256.txt
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .build/linux/deb/amd64/**/*.deb
            .build/linux/checksums-sha256.txt
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # macOS BUILD — produces .dmg (opt-in, expensive)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-macos:
    needs: compile
    name: macOS x64 Build
    if: github.event.inputs.build_macos == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS package
        run: npx gulp vscode-darwin-x64
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Create macOS ZIP archive
        run: |
          cd .build/darwin/x64
          APP_NAME=$(ls -d Construct*.app 2>/dev/null || ls -d *.app 2>/dev/null | head -1)
          if [ -n "$APP_NAME" ]; then
            zip -r "../construct-ide-darwin-x64.zip" "$APP_NAME"
          else
            echo "No .app found, zipping entire directory"
            cd ..
            zip -r "construct-ide-darwin-x64.zip" x64/
          fi

      - name: Generate SHA256 checksums
        run: |
          cd .build/darwin
          find . -name "*.zip" -exec sh -c 'shasum -a 256 "$1" >> checksums-sha256.txt' _ {} \;
          cat checksums-sha256.txt || echo "No archives found, listing dir:"
          ls -la

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: construct-ide-macos-x64
          path: |
            .build/darwin/**/*.zip
            .build/darwin/checksums-sha256.txt
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .build/darwin/**/*.zip
            .build/darwin/checksums-sha256.txt
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
