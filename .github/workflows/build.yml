name: MVP Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Update Cargo.lock
        run: cd src/main && cargo update

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          tagName: ${{ github.ref_name }}
          releaseName: 'Construct ${{ github.ref_name }}'
          releaseBody: 'Minimum Viable Build — Windows .msi installer'
          releaseDraft: true
          prerelease: true
