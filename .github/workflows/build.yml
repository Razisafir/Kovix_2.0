name: Build Kovix IDE

on:
  push:
    branches: [main, release/*]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch/tag/sha) to build'
        required: false
        default: 'main'
      build_macos:
        description: 'Build macOS (expensive runner)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      attach_to_release:
        description: 'Attach artifacts to matching GitHub Release (if tag)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  KOVIX_ARCH: x64
  KOVIX_QUALITY: stable

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # COMPILE CHECK — fast gate, runs first
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  compile:
    name: Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev libx11-dev libxkbfile-dev libsecret-1-dev

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Clean node-gyp cache
        run: rm -rf ~/.cache/node-gyp || true

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Verify .npmrc target matches resolved Electron version
        shell: bash
        run: node build/lib/verify-npmrc-target.js

      - name: Verify native modules load against current ABI
        shell: bash
        run: node build/lib/verify-native-modules.js

      - name: Compile
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # WINDOWS BUILD — produces .exe installer
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-windows:
    needs: compile
    name: Windows x64 Build
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install setuptools (for node-gyp compatibility)
        run: python -m pip install --upgrade setuptools wheel

      - name: Upgrade node-gyp to support VS 18
        shell: pwsh
        run: |
          # The bundled node-gyp v10.1.0 in Node 20 doesn't recognize VS 18 (preview)
          # Install latest node-gyp globally and tell npm to use it
          npm install -g node-gyp@latest
          $gypPath = "$(npm root -g)\node-gyp\bin\node-gyp.js"
          Write-Host "node-gyp path: $gypPath"
          "npm_config_node_gyp=$gypPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          # Find any available VS installation
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            Write-Host "Available VS installations:"
            & $vswhere -prerelease -all -property displayName
          }

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GYP_MSVS_VERSION: '2022'
          npm_config_msvs_version: '2022'

      - name: Verify .npmrc target matches resolved Electron version
        shell: bash
        run: node build/lib/verify-npmrc-target.js

      - name: Verify native modules load against current ABI
        shell: bash
        run: node build/lib/verify-native-modules.js

      - name: Build Windows package
        run: npx gulp vscode-win32-x64
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Copy Inno Updater
        run: npx gulp vscode-win32-x64-inno-updater
        timeout-minutes: 5

      - name: Build Windows system setup (.exe)
        run: npx gulp vscode-win32-x64-system-setup
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows user setup (.exe)
        run: npx gulp vscode-win32-x64-user-setup
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Generate SHA256 checksum
        run: |
          $exe = Get-ChildItem .build\win32-x64\system-setup\*.exe | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash
          "$hash  $($exe.Name)" | Out-File -FilePath .build\win32-x64\checksums-sha256.txt -Encoding utf8
          Get-Content .build\win32-x64\checksums-sha256.txt

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: kovix-windows-x64
          path: |
            .build/win32-x64/system-setup/*.exe
            .build/win32-x64/user-setup/*.exe
            .build/win32-x64/checksums-sha256.txt
          retention-days: 30

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # LINUX BUILD — produces .deb package
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-linux:
    needs: compile
    name: Linux x64 Build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm libkrb5-dev libx11-dev libxkbfile-dev libsecret-1-0 libsecret-1-dev libgtk-3-0 libgbm1

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify .npmrc target matches resolved Electron version
        shell: bash
        run: node build/lib/verify-npmrc-target.js

      - name: Verify native modules load against current ABI
        shell: bash
        run: node build/lib/verify-native-modules.js

      - name: Build Linux package
        run: npx gulp vscode-linux-x64
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build Linux DEB
        run: |
          npx gulp vscode-linux-x64-prepare-deb
          npx gulp vscode-linux-x64-build-deb
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux RPM
        run: |
          npx gulp vscode-linux-x64-prepare-rpm
          npx gulp vscode-linux-x64-build-rpm
        timeout-minutes: 30
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux tar.gz
        run: |
          npx gulp vscode-linux-x64-build-tar-gz
        timeout-minutes: 30
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        run: |
          cd .build/linux
          sha256sum deb/amd64/**/*.deb > checksums-sha256.txt 2>/dev/null || true
          find . -name "*.rpm" -exec sha256sum {} \; >> checksums-sha256.txt 2>/dev/null || true
          find . -name "*.tar.gz" -exec sha256sum {} \; >> checksums-sha256.txt 2>/dev/null || true
          cat checksums-sha256.txt

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: kovix-linux-x64
          path: |
            .build/linux/deb/amd64/**/*.deb
            .build/linux/**/*.rpm
            .build/linux/**/*.tar.gz
            .build/linux/checksums-sha256.txt
          retention-days: 30

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # macOS BUILD — produces .dmg (opt-in, expensive)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-macos:
    needs: compile
    name: macOS x64 Build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_macos == 'true'
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify .npmrc target matches resolved Electron version
        shell: bash
        run: node build/lib/verify-npmrc-target.js

      - name: Verify native modules load against current ABI
        shell: bash
        run: node build/lib/verify-native-modules.js

      - name: Build macOS package
        run: npx gulp vscode-darwin-x64
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Create macOS ZIP archive
        run: |
          # The gulp output goes to VSCode-darwin-x64/ folder
          if [ -d "VSCode-darwin-x64" ]; then
            cd VSCode-darwin-x64
            APP_NAME=$(ls -d *.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              zip -r "../kovix-darwin-x64.zip" "$APP_NAME"
            else
              cd ..
              zip -r "kovix-darwin-x64.zip" "VSCode-darwin-x64/"
            fi
          elif [ -d ".build/darwin/x64" ]; then
            cd .build/darwin/x64
            APP_NAME=$(ls -d *.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              zip -r "../kovix-darwin-x64.zip" "$APP_NAME"
            else
              cd ..
              zip -r "kovix-darwin-x64.zip" x64/
            fi
          else
            echo "ERROR: Cannot find macOS build output directory"
            ls -la
            find . -name "*.app" -maxdepth 3 2>/dev/null
            exit 1
          fi

      - name: Generate SHA256 checksums
        run: |
          shasum -a 256 kovix-darwin-x64.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: kovix-macos-x64
          path: |
            kovix-darwin-x64.zip
            checksums-sha256.txt
          retention-days: 30

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # ATTACH TO RELEASE — uploads .deb + checksums
  # to the matching GitHub Release when building a tag.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  attach-to-release:
    needs: [build-linux]
    name: Attach .deb to GitHub Release
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.attach_to_release != 'false' && (startsWith(github.ref, 'refs/tags/v') || startsWith(inputs.ref, 'v') || startsWith(inputs.ref, 'refs/tags/v')) }}
    permissions:
      contents: write
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            REF="${{ inputs.ref }}"
          else
            REF="${GITHUB_REF#refs/}"
          fi
          # Strip leading "tags/" or "heads/"
          TAG="${REF#tags/}"
          TAG="${TAG#heads/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG"

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: kovix-linux-x64
          path: ./linux-artifacts

      - name: Inspect downloaded artifacts
        run: |
          find ./linux-artifacts -type f -exec ls -la {} \;

      - name: Upload .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            ./linux-artifacts/**/*.deb
            ./linux-artifacts/**/checksums-sha256.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
