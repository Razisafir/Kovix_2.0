name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - main-dev
      - release/*
      - kovix-rebuild
  pull_request:
    branches:
      - main
      - main-dev

# Global env vars for native module compilation against Electron ABI.
# These MUST be set before npm install/ci so that node-gyp downloads
# Electron headers (v42.4.1) instead of Node.js headers (v22.12.0).
# Previously these came from .npmrc (target=, runtime=), but npm 11.13.0
# deprecated those keys. Now they must be injected as env vars.
env:
  npm_config_target: '42.4.1'
  npm_config_runtime: electron
  npm_config_disturl: https://electronjs.org/headers
  npm_config_build_from_source: 'true'

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Linux — existing CI job (compile + test)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev pkg-config libkrb5-dev libxss1 dbus xvfb libgtk-3-0 libgbm1 libsecret-1-dev
          sudo cp build/azure-pipelines/linux/xvfb.init /etc/init.d/xvfb
          sudo chmod +x /etc/init.d/xvfb
          sudo update-rc.d xvfb defaults
          sudo service xvfb start

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Clean node-gyp cache
        run: rm -rf ~/.cache/node-gyp || true

      - name: Compute node modules cache key
        id: nodeModulesCacheKey
        run: echo "value=$(node build/azure-pipelines/common/computeNodeModulesCacheKey.js)" >> $GITHUB_OUTPUT
      - name: Cache node modules
        id: cacheNodeModules
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-cacheNodeModulesLinux-${{ steps.nodeModulesCacheKey.outputs.value }}
      - name: Get npm cache directory path
        id: npmCacheDirPath
        if: ${{ steps.cacheNodeModules.outputs.cache-hit != 'true' }}
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      - name: Cache npm directory
        if: ${{ steps.cacheNodeModules.outputs.cache-hit != 'true' }}
        uses: actions/cache@v4
        with:
          path: ${{ steps.npmCacheDirPath.outputs.dir }}
          key: ${{ runner.os }}-npmCacheDir-${{ steps.nodeModulesCacheKey.outputs.value }}
          restore-keys: ${{ runner.os }}-npmCacheDir-
      - name: Execute npm
        if: ${{ steps.cacheNodeModules.outputs.cache-hit != 'true' }}
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        run: npm ci

      - name: Rebuild native modules against Electron ABI
        shell: bash
        run: node build/lib/rebuild-native-modules.js
      - name: Verify .npmrc target matches resolved Electron version
        shell: bash
        run: node build/lib/verify-npmrc-target.js

      - name: Verify Electron version pin chain (full)
        shell: bash
        run: node build/lib/verify-electron-pins.js

      - name: Verify native modules load against current ABI
        shell: bash
        run: node build/lib/verify-native-modules.js

      - name: Compile and Download
        run: npm exec -- npm-run-all -lp compile "electron x64" playwright-install download-builtin-extensions

      - name: Compile Integration Tests
        run: npm run compile
        working-directory: test/integration/browser

      - name: Run Unit Tests (Electron)
        id: electron-unit-tests
        continue-on-error: true
        run: DISPLAY=:10 ./scripts/test.sh --no-sandbox

      - name: Run Unit Tests (node.js)
        id: nodejs-unit-tests
        continue-on-error: true
        run: npm run test-node

      - name: Run Unit Tests (Browser, Chromium)
        id: browser-unit-tests
        continue-on-error: true
        run: DISPLAY=:10 npm run test-browser-no-install -- --browser chromium

      - name: Run Integration Tests (Electron)
        id: electron-integration-tests
        continue-on-error: true
        run: DISPLAY=:10 ./scripts/test-integration.sh --no-sandbox

      - name: Run Integration Tests (Browser, Chromium)
        id: browser-integration-tests
        continue-on-error: true
        run: DISPLAY=:10 ./scripts/test-web-integration.sh --browser chromium

      - name: Run Integration Tests (Remote)
        id: electron-remote-integration-tests
        continue-on-error: true
        timeout-minutes: 15
        run: DISPLAY=:10 ./scripts/test-remote-integration.sh --no-sandbox

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Kovix Hygiene — lint, type-check, and hygiene
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  kovix-hygiene:
    name: Kovix Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev libx11-dev libxkbfile-dev libsecret-1-dev

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Clean node-gyp cache
        run: rm -rf ~/.cache/node-gyp || true

      - name: Compute node modules cache key
        id: nodeModulesCacheKey
        run: echo "value=$(node build/azure-pipelines/common/computeNodeModulesCacheKey.js)" >> $GITHUB_OUTPUT
      - name: Cache node modules
        id: cacheNodeModules
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-cacheNodeModulesLinux-${{ steps.nodeModulesCacheKey.outputs.value }}
      - name: Get npm cache directory path
        id: npmCacheDirPath
        if: ${{ steps.cacheNodeModules.outputs.cache-hit != 'true' }}
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      - name: Cache npm directory
        if: ${{ steps.cacheNodeModules.outputs.cache-hit != 'true' }}
        uses: actions/cache@v4
        with:
          path: ${{ steps.npmCacheDirPath.outputs.dir }}
          key: ${{ runner.os }}-npmCacheDir-${{ steps.nodeModulesCacheKey.outputs.value }}
          restore-keys: ${{ runner.os }}-npmCacheDir-
      - name: Execute npm
        if: ${{ steps.cacheNodeModules.outputs.cache-hit != 'true' }}
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        run: npm ci

      - name: Rebuild native modules against Electron ABI
        shell: bash
        run: node build/lib/rebuild-native-modules.js
      - name: Verify .npmrc target matches resolved Electron version
        shell: bash
        run: node build/lib/verify-npmrc-target.js

      - name: Verify Electron version pin chain (full)
        shell: bash
        run: node build/lib/verify-electron-pins.js

      - name: Compile Kovix code
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Cross-Platform Build Matrix — Phase 7
  #
  # Verifies that `npm install` (NOT --ignore-scripts) succeeds
  # on all three target platforms with real OS-level native module
  # compilation. This is the critical gap: every prior verification
  # was Linux-container-only with the libxkbfile-dev workaround.
  #
  # GitHub Actions runners have real sudo (Linux), Visual Studio
  # Build Tools (Windows), and Xcode CLI tools (macOS), so this
  # is the first test of whether the native build truly works
  # cross-platform without container-specific workarounds.
  #
  # IMPORTANT: The global `env` block sets npm_config_target,
  # npm_config_runtime, npm_config_disturl, and
  # npm_config_build_from_source so that node-gyp compiles against
  # Electron 42.4.1 headers during `npm install`. Without these,
  # node-gyp tries to download Node.js v22.12.0 headers from the
  # Electron disturl, gets a 404, and the build fails.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  cross-platform-build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-13, ubuntu-latest]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── System dependencies (per-OS) ──────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbfile-dev libx11-dev libkrb5-dev libsecret-1-dev \
            libgtk-3-dev libgbm-dev libnss3-dev \
            fakeroot dpkg-dev rpm

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          # Xcode CLI tools are pre-installed on macos-13;
          # confirm and install if somehow missing.
          xcode-select -p || xcode-select --install

      - name: Set macOS C++ compiler flags for spdlog compat
        if: runner.os == 'macOS'
        run: |
          # @vscode/spdlog bundles an older fmt library that uses deprecated
          # literal operator syntax (operator""_a with preceding whitespace)
          # which Xcode 15+ treats as an error. Suppress this specific
          # warning so the build succeeds on newer macOS runners.
          echo "CXXFLAGS=-Wno-deprecated-literal-operator" >> $GITHUB_ENV
          echo "CFLAGS=-Wno-deprecated-literal-operator" >> $GITHUB_ENV

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # windows-2022 includes Visual Studio Build Tools 2022
          # by default. Confirm the C++ toolchain is available.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $vs = & $vswhere -prerelease -latest -property displayName
            Write-Host "Found: $vs"
          } else {
            Write-Host "WARNING: vswhere not found — VS Build Tools may not be installed"
          }
          # Ensure GYP_MSVS_VERSION is set so node-gyp finds VS 2022
          echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV
          echo "npm_config_msvs_version=2022" >> $env:GITHUB_ENV

      # ── Node.js setup ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install setuptools (Windows, node-gyp compat)
        if: runner.os == 'Windows'
        run: python -m pip install --upgrade setuptools wheel

      - name: Upgrade node-gyp (Windows, VS 18 support)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm install -g node-gyp@latest
          $gypPath = "$(npm root -g)\node-gyp\bin\node-gyp.js"
          Write-Host "node-gyp path: $gypPath"
          "npm_config_node_gyp=$gypPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── Verify Electron ABI config ────────────────────────
      # The global env block sets npm_config_target=42.4.1,
      # npm_config_runtime=electron, etc. This step confirms
      # those values are correct before we spend 20+ minutes
      # on npm install.
      - name: Verify Electron ABI configuration
        shell: bash
        run: |
          echo "npm_config_target   = $npm_config_target"
          echo "npm_config_runtime  = $npm_config_runtime"
          echo "npm_config_disturl  = $npm_config_disturl"
          echo "Node.js version     = $(node -v)"
          # Verify the target matches package.json config
          PKG_TARGET=$(node -e "console.log(require('./package.json').config.electronVersion)")
          if [ "$npm_config_target" != "$PKG_TARGET" ]; then
            echo "ERROR: npm_config_target ($npm_config_target) != package.json config.electronVersion ($PKG_TARGET)"
            exit 1
          fi
          echo "OK: Electron ABI target = $PKG_TARGET"

      # ── npm install (NO --ignore-scripts) ─────────────────
      # This is THE critical test. The global npm_config_* env
      # vars ensure node-gyp compiles against Electron 42.4.1
      # headers during install. Prior CI runs without these vars
      # failed with "404 downloading v22.12.0 headers from
      # electronjs.org" because node-gyp used the system Node
      # version with the Electron disturl.
      - name: npm install (full, no --ignore-scripts)
        run: npm install
        timeout-minutes: 45
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      # ── Post-install verification ─────────────────────────
      - name: Rebuild native modules against Electron ABI
        shell: bash
        run: node build/lib/rebuild-native-modules.js

      - name: Verify native modules load
        shell: bash
        run: node build/lib/verify-native-modules.js

      # ── Extension dependencies ────────────────────────────
      # Ported from BUILD_STATUS.md §4c: root npm install does
      # NOT install extension subdirectory node_modules.
      - name: Install extension dependencies
        shell: bash
        run: |
          for dir in extensions/*/; do
            [ -f "$dir/package.json" ] && (cd "$dir" && npm install --no-fund --no-audit 2>&1 | tail -1)
          done
          for dir in extensions/*/server/; do
            [ -f "$dir/package.json" ] && (cd "$dir" && npm install --no-fund --no-audit 2>&1 | tail -1)
          done
          if [ -d ".vscode/extensions/vscode-selfhost-test-provider" ]; then
            cd .vscode/extensions/vscode-selfhost-test-provider && npm install --no-fund --no-audit 2>&1 | tail -1
          fi

      # ── Compile ───────────────────────────────────────────
      - name: Compile (TypeScript)
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile
        timeout-minutes: 30

      # ── Package per platform ──────────────────────────────
      # This produces actual installable artifacts that Razi can
      # download and run directly — no local npm install needed.
      - name: Package Linux (.deb + .tar.gz)
        if: runner.os == 'Linux'
        run: |
          npx gulp vscode-linux-x64
          npx gulp vscode-linux-x64-prepare-deb
          npx gulp vscode-linux-x64-build-deb
        timeout-minutes: 60
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Package Windows (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npx gulp vscode-win32-x64
          npx gulp vscode-win32-x64-inno-updater
          npx gulp vscode-win32-x64-system-setup
        timeout-minutes: 60
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Package macOS (.zip)
        if: runner.os == 'macOS'
        run: |
          npx gulp vscode-darwin-x64
          # Zip the .app bundle
          if [ -d "VSCode-darwin-x64" ]; then
            cd VSCode-darwin-x64
            APP_NAME=$(ls -d *.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              zip -r "../kovix-darwin-x64.zip" "$APP_NAME"
            else
              cd .. && zip -r "kovix-darwin-x64.zip" "VSCode-darwin-x64/"
            fi
          elif [ -d ".build/darwin/x64" ]; then
            cd .build/darwin/x64
            APP_NAME=$(ls -d *.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              zip -r "../../../kovix-darwin-x64.zip" "$APP_NAME"
            else
              cd ../../.. && zip -r "kovix-darwin-x64.zip" ".build/darwin/x64/"
            fi
          else
            echo "ERROR: Cannot find macOS build output"
            find . -name "*.app" -maxdepth 3 2>/dev/null || true
            exit 1
          fi
        timeout-minutes: 60
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      # ── Generate checksums ────────────────────────────────
      - name: Generate SHA256 checksums (Linux)
        if: runner.os == 'Linux'
        run: |
          cd .build/linux
          sha256sum deb/amd64/**/*.deb > checksums-sha256.txt 2>/dev/null || true
          find . -name "*.tar.gz" -exec sha256sum {} \; >> checksums-sha256.txt 2>/dev/null || true
          cat checksums-sha256.txt

      - name: Generate SHA256 checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem .build\win32-x64\system-setup\*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash
            "$hash  $($exe.Name)" | Out-File -FilePath .build\win32-x64\checksums-sha256.txt -Encoding utf8
            Get-Content .build\win32-x64\checksums-sha256.txt
          } else {
            Write-Host "WARNING: No .exe found in .build\win32-x64\system-setup\"
            Get-ChildItem .build\win32-x64\ -Recurse -Name 2>$null | Select-Object -First 20
          }

      - name: Generate SHA256 checksums (macOS)
        if: runner.os == 'macOS'
        run: |
          shasum -a 256 kovix-darwin-x64.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      # ── Upload build artifacts ────────────────────────────
      - name: Upload Linux packages
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: kovix-cross-platform-linux-x64
          path: |
            .build/linux/deb/amd64/**/*.deb
            .build/linux/**/*.tar.gz
            .build/linux/checksums-sha256.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: kovix-cross-platform-windows-x64
          path: |
            .build/win32-x64/system-setup/*.exe
            .build/win32-x64/checksums-sha256.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload macOS package
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: kovix-cross-platform-macos-x64
          path: |
            kovix-darwin-x64.zip
            checksums-sha256.txt
          retention-days: 30
          if-no-files-found: warn

      # ── Upload full build log on failure ──────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.os }}
          path: |
            npm-debug.log
            _logs/
          retention-days: 7
          if-no-files-found: ignore

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # Smoke Test — launch the built app briefly to confirm it
      # doesn't crash immediately. This is a stretch goal; the
      # build+package steps above are the primary deliverable.
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      # ── Linux: Xvfb + Electron launch ─────────────────────
      - name: Smoke test — Linux (Xvfb)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Start Xvfb (GitHub Linux runners support this)
          sudo apt-get install -y xvfb scrot
          Xvfb :99 -screen 0 1280x1024x24 &
          XVFB_PID=$!
          sleep 2
          export DISPLAY=:99

          # Launch the compiled app from out/ directory
          # scripts/code.sh is the standard dev launcher
          timeout 30 ./scripts/code.sh \
            --disable-gpu \
            --disable-dev-shm-usage \
            --no-sandbox \
            --disable-setuid-sandbox \
            --ozone-platform=x11 \
            --use-gl=swiftshader \
            2>&1 | head -50 > /tmp/kovix-smoke-output.txt || true

          # Check if the process exited with an error code
          EXIT_CODE=${PIPESTATUS[0]:-0}
          echo "--- Smoke test output (first 50 lines) ---"
          cat /tmp/kovix-smoke-output.txt

          # Take a screenshot if possible
          scrot /tmp/kovix-smoke-screenshot.png 2>/dev/null || echo "scrot failed (expected if no window appeared)"

          # Clean up
          kill $XVFB_PID 2>/dev/null || true

          # If the process crashed (non-zero, non-timeout exit), fail
          # timeout(1) exits 124 on timeout — that's OK (means app ran for 30s)
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 124 ]; then
            echo "FAIL: App exited with code $EXIT_CODE (not timeout)"
            exit 1
          fi
          echo "PASS: App ran for 30s or exited cleanly"

      # ── Windows: direct Electron launch ───────────────────
      - name: Smoke test — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Windows runners have a real (virtual) display — no Xvfb needed
          $proc = Start-Process -FilePath ".\scripts\code.sh" `
            -ArgumentList "--disable-gpu","--no-sandbox" `
            -PassThru -NoNewWindow -RedirectStandardOutput "$env:TEMP\kovix-smoke-stdout.txt" -RedirectStandardError "$env:TEMP\kovix-smoke-stderr.txt"

          # Wait up to 30 seconds
          $exited = $proc.WaitForExit(30000)

          if ($exited) {
            $code = $proc.ExitCode
            Write-Host "Process exited with code: $code"
            if ($code -ne 0) {
              Write-Host "FAIL: App crashed with exit code $code"
              Get-Content "$env:TEMP\kovix-smoke-stderr.txt" -ErrorAction SilentlyContinue | Select-Object -First 30
              exit 1
            }
          } else {
            Write-Host "PASS: App still running after 30s (no crash)"
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

          Get-Content "$env:TEMP\kovix-smoke-stdout.txt" -ErrorAction SilentlyContinue | Select-Object -First 30
          Get-Content "$env:TEMP\kovix-smoke-stderr.txt" -ErrorAction SilentlyContinue | Select-Object -First 30

      # ── macOS: direct Electron launch ─────────────────────
      - name: Smoke test — macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # macOS runners have a real (virtual) display — no Xvfb needed
          timeout 30 ./scripts/code.sh \
            --disable-gpu \
            --no-sandbox \
            2>&1 | head -50 > /tmp/kovix-smoke-output.txt || true

          EXIT_CODE=${PIPESTATUS[0]:-0}
          echo "--- Smoke test output (first 50 lines) ---"
          cat /tmp/kovix-smoke-output.txt

          # timeout(1) exits 124 on timeout — that's OK
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 124 ]; then
            echo "FAIL: App exited with code $EXIT_CODE (not timeout)"
            exit 1
          fi
          echo "PASS: App ran for 30s or exited cleanly"

      # ── Upload smoke test artifacts ───────────────────────
      - name: Upload smoke test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-${{ matrix.os }}
          path: |
            /tmp/kovix-smoke-output.txt
            /tmp/kovix-smoke-screenshot.png
            ${{ runner.os == 'Windows' && format('{0}\\kovix-smoke-stdout.txt', runner.temp) || '' }}
            ${{ runner.os == 'Windows' && format('{0}\\kovix-smoke-stderr.txt', runner.temp) || '' }}
          retention-days: 14
          if-no-files-found: ignore
