name: Release Build

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Allows manual triggering

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      KOVIX_ARCH: x64
      KOVIX_QUALITY: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # npm audit fails on critical CVEs — do NOT use continue-on-error;
      # critical vulnerabilities must block the release build.
      - name: Security audit (production deps only)
        run: npm audit --production --audit-level=critical

      - name: Compile
        run: npm run compile

      - name: Build Windows installer
        run: node ./node_modules/gulp/bin/gulp.js vscode-win32-x64-inno-updater

      - name: Sign (Windows)
        if: env.KOVIX_SIGN_CERT_PATH != ''
        env:
          KOVIX_SIGN_CERT_PATH: ${{ secrets.WINDOWS_CERT_PATH }}
          KOVIX_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: node build/azure-pipelines/common/sign-win32.js

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: kovix-windows
          path: .build/win32-x64/**/*.exe

  build-macos:
    runs-on: macos-latest
    env:
      KOVIX_ARCH: x64
      KOVIX_QUALITY: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # npm audit fails on critical CVEs — do NOT use continue-on-error;
      # critical vulnerabilities must block the release build.
      - name: Security audit (production deps only)
        run: npm audit --production --audit-level=critical

      - name: Compile
        run: npm run compile

      # macOS runners cost 10× more than Linux; only build when releasing
      - name: Build macOS app
        run: node ./node_modules/gulp/bin/gulp.js vscode-darwin-x64

      - name: Sign (macOS)
        if: env.KOVIX_SIGN_IDENTITY != ''
        env:
          KOVIX_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KOVIX_SIGN_CERT_PATH: ${{ secrets.APPLE_CERT_PATH }}
          KOVIX_SIGN_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: node build/darwin/sign.js

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: kovix-macos
          path: .build/darwin-x64/**/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    env:
      KOVIX_ARCH: x64
      KOVIX_QUALITY: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev pkg-config libsecret-1-dev libxss1 dbus xvfb libgtk-3-0 libgbm1

      - name: Install dependencies
        run: npm ci

      # npm audit fails on critical CVEs — do NOT use continue-on-error;
      # critical vulnerabilities must block the release build.
      - name: Security audit (production deps only)
        run: npm audit --production --audit-level=critical

      - name: Compile
        run: npm run compile

      - name: Build Linux package
        run: node ./node_modules/gulp/bin/gulp.js vscode-linux-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: kovix-linux
          path: .build/linux-x64/**/*.tar.gz

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate SHA256 hashes
        run: |
          mkdir -p out/
          cp -r kovix-windows/* kovix-macos/* kovix-linux/* out/ 2>/dev/null || true
          cd out/
          sha256sum *.zip *.deb *.exe *.tar.gz > checksums.txt 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*
          body: |
            ## Kovix Release

            AI-native development environment built on VS Code open source.

            ### Downloads
            - **Windows**: Download the `.exe` installer
            - **macOS**: Download the `.dmg` file
            - **Linux**: Download the `.tar.gz` archive

            ### Checksums
            See `checksums.txt` in the release assets for SHA256 hashes.

            ### What's New
            See [CHANGELOG.md](https://github.com/Razisafir/KOVIX/blob/main/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate update.json
        run: node scripts/generate-update-json.js

      - name: Deploy update server
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
