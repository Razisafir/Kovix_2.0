name: Release Build

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.1)'
        required: false
        type: string

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      KOVIX_ARCH: x64
      KOVIX_QUALITY: stable
      GYP_MSVS_VERSION: '2022'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install setuptools (for node-gyp compatibility)
        run: python -m pip install --upgrade setuptools wheel

      - name: Upgrade node-gyp to support VS 18
        shell: pwsh
        run: |
          # The bundled node-gyp v10.1.0 in Node 20 doesn't recognize VS 18 (preview)
          # Install latest node-gyp globally and tell npm to use it
          npm install -g node-gyp@latest
          $gypPath = "$(npm root -g)\node-gyp\bin\node-gyp.js"
          Write-Host "node-gyp path: $gypPath"
          "npm_config_node_gyp=$gypPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          # Find any available VS installation
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            Write-Host "Available VS installations:"
            & $vswhere -prerelease -all -property displayName
          }

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GYP_MSVS_VERSION: '2022'
          npm_config_msvs_version: '2022'
          npm_config_build_from_source: "true"

      - name: Compile
        shell: bash
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile

      - name: Build Windows package
        run: npx gulp vscode-win32-x64
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Copy Inno Updater
        run: npx gulp vscode-win32-x64-inno-updater

      - name: Build Windows system setup (.exe)
        run: npx gulp vscode-win32-x64-system-setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksum
        run: |
          $exe = Get-ChildItem .build\win32-x64\system-setup\*.exe | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash
          "$hash  $($exe.Name)" | Out-File -FilePath .build\win32-x64\checksums-sha256.txt -Encoding utf8
          Get-Content .build\win32-x64\checksums-sha256.txt

      - name: Sign (Windows)
        if: env.KOVIX_SIGN_CERT_PATH != ''
        env:
          KOVIX_SIGN_CERT_PATH: ${{ secrets.WINDOWS_CERT_PATH }}
          KOVIX_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: node build/azure-pipelines/common/sign-win32.js

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: kovix-windows
          path: |
            .build/win32-x64/system-setup/*.exe
            .build/win32-x64/checksums-sha256.txt

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      KOVIX_ARCH: x64
      KOVIX_QUALITY: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30

      - name: Compile
        shell: bash
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile

      - name: Build macOS package
        run: npx gulp vscode-darwin-x64
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Create macOS ZIP archive
        run: |
          if [ -d "VSCode-darwin-x64" ]; then
            cd VSCode-darwin-x64
            APP_NAME=$(ls -d *.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              zip -r "../kovix-darwin-x64.zip" "$APP_NAME"
            else
              cd ..
              zip -r "kovix-darwin-x64.zip" "VSCode-darwin-x64/"
            fi
          elif [ -d ".build/darwin/x64" ]; then
            cd .build/darwin/x64
            APP_NAME=$(ls -d *.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              zip -r "../kovix-darwin-x64.zip" "$APP_NAME"
            else
              cd ..
              zip -r "kovix-darwin-x64.zip" x64/
            fi
          else
            echo "ERROR: Cannot find macOS build output directory"
            ls -la
            find . -name "*.app" -maxdepth 3 2>/dev/null
            exit 1
          fi

      - name: Generate SHA256 checksums
        run: |
          shasum -a 256 kovix-darwin-x64.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Sign (macOS)
        if: env.KOVIX_SIGN_IDENTITY != ''
        env:
          KOVIX_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KOVIX_SIGN_CERT_PATH: ${{ secrets.APPLE_CERT_PATH }}
          KOVIX_SIGN_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: node build/darwin/sign.js

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: kovix-macos
          path: |
            kovix-darwin-x64.zip
            checksums-sha256.txt

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KOVIX_ARCH: x64
      KOVIX_QUALITY: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm libkrb5-dev libx11-dev libxkbfile-dev libsecret-1-0 libsecret-1-dev libgtk-3-0 libgbm1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30

      - name: Compile
        shell: bash
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile

      - name: Build Linux package
        run: npx gulp vscode-linux-x64
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build Linux DEB
        run: |
          npx gulp vscode-linux-x64-prepare-deb
          npx gulp vscode-linux-x64-build-deb
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux RPM
        run: |
          npx gulp vscode-linux-x64-prepare-rpm
          npx gulp vscode-linux-x64-build-rpm
        timeout-minutes: 30
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux tar.gz
        run: |
          npx gulp vscode-linux-x64-build-tar-gz
        timeout-minutes: 30
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        run: |
          cd .build/linux
          sha256sum deb/amd64/**/*.deb > checksums-sha256.txt 2>/dev/null || true
          find . -name "*.rpm" -exec sha256sum {} \; >> checksums-sha256.txt 2>/dev/null || true
          find . -name "*.tar.gz" -exec sha256sum {} \; >> checksums-sha256.txt 2>/dev/null || true
          cat checksums-sha256.txt

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: kovix-linux
          path: |
            .build/linux/deb/amd64/**/*.deb
            .build/linux/**/*.rpm
            .build/linux/**/*.tar.gz
            .build/linux/checksums-sha256.txt

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate SHA256 hashes
        run: |
          mkdir -p out/
          cp -r kovix-windows/* kovix-macos/* kovix-linux/* out/ 2>/dev/null || true
          cd out/
          sha256sum *.zip *.deb *.exe *.tar.gz > checksums.txt 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*
          body: |
            ## Kovix Release

            AI-native development environment with autonomous coding agents.

            ### Downloads
            - **Windows**: `.exe` installer (system-wide or user install)
            - **macOS**: `.zip` archive containing the app
            - **Linux**: `.deb` / `.rpm` / `.tar.gz` packages

            ### Verify Download Integrity
            Each release includes SHA256 checksums. Verify with:
            ```bash
            sha256sum -c checksums-sha256.txt
            ```

            ### Checksums
            See `checksums.txt` in the release assets for SHA256 hashes.

            ### What's New
            See [CHANGELOG.md](https://github.com/Razisafir/KOVIX/blob/main/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
