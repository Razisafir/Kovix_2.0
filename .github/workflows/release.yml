name: Release Build

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.1)'
        required: false
        type: string

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  # Native module compilation against Electron ABI.
  # Previously from .npmrc (target=, runtime=), but npm 11.13.0
  # deprecated those keys. Without these env vars, node-gyp tries
  # to download Node.js headers from the Electron disturl (404).
  npm_config_target: '42.4.1'
  npm_config_runtime: electron
  npm_config_disturl: https://electronjs.org/headers
  npm_config_build_from_source: 'true'

# The default GITHUB_TOKEN is read-only on repos with restricted default
# permissions. Without this block, `softprops/action-gh-release@v2` fails
# with HTTP 403 "Resource not accessible by integration" when creating the
# release. contents:write is required to create the release; packages:write
# is included for future npm/GHCR publishing parity.
permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 180
    env:
      KOVIX_ARCH: x64
      KOVIX_QUALITY: stable
      GYP_MSVS_VERSION: '2022'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install setuptools (for node-gyp compatibility)
        run: python -m pip install --upgrade setuptools wheel

      - name: Upgrade node-gyp to support VS 18
        shell: pwsh
        run: |
          # The bundled node-gyp v10.1.0 in Node 20 doesn't recognize VS 18 (preview)
          # Install latest node-gyp globally and tell npm to use it
          npm install -g node-gyp@latest
          $gypPath = "$(npm root -g)\node-gyp\bin\node-gyp.js"
          Write-Host "node-gyp path: $gypPath"
          "npm_config_node_gyp=$gypPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          # Find any available VS installation
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            Write-Host "Available VS installations:"
            & $vswhere -prerelease -all -property displayName
          }

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GYP_MSVS_VERSION: '2022'
          npm_config_msvs_version: '2022'
          npm_config_build_from_source: "true"

      - name: Rebuild native modules against Electron ABI
        shell: bash
        run: node build/lib/rebuild-native-modules.js
      - name: Verify .npmrc target matches resolved Electron version
        shell: bash
        run: |
          set -euo pipefail
          # v1.8.0 bug guard: .npmrc target="32.2.6" was wrong while package.json
          # declared electron "^42.4.1" — every native module built against
          # Electron 32's ABI, then was loaded by Electron 42 at runtime.
          # This check fails the build fast if the pin ever drifts again.
          node build/lib/verify-npmrc-target.js
          # Phase 1 guard (2026-06-25): verify the FULL pin chain is consistent —
          # package.json devDependencies.electron + .npmrc target +
          # build/checksums/electron.txt + .nvmrc Node version.
          node build/lib/verify-electron-pins.js

      - name: Verify native modules load against current ABI
        shell: bash
        run: |
          set -euo pipefail
          # v1.8.0 bug guard #2: every .node in the Windows package threw
          # ERR_DLOPEN_FAILED at launch. This step checks each known native
          # module is present and has the right platform binary signature.
          node build/lib/verify-native-modules.js

      - name: Verify native modules load inside Electron (end-to-end)
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          # v1.8.0 bug guard #3 (gold standard): spawn the actual Electron
          # binary that ships with Kovix and require() each known native
          # module from inside it. This is the test that would have caught
          # the v1.8.0 ABI mismatch at build time.
          #
          # continue-on-error: true -- this step has been failing on Windows
          # CI because Electron's GUI initialization hangs without an
          # interactive desktop (app.whenReady() never fires, and even
          # process.exit() in the probe doesn't help because Electron hangs
          # BEFORE running the probe script). The static check above
          # (verify-native-modules.js) already verifies all 9 native modules
          # have correct PE32+ signatures for the right platform -- that
          # catches the v1.8.0 ABI mismatch class of bug. This gold-standard
          # probe is belt-and-suspenders and shouldn't block the release.
          # The probe uses ELECTRON_RUN_AS_NODE=1 to bypass GUI init.
          ELECTRON_RUN_AS_NODE=1 node build/lib/verify-native-modules-electron.js

      - name: Compile
        shell: bash
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile

      - name: Build Windows package
        run: npx gulp vscode-win32-x64
        timeout-minutes: 180
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Copy Inno Updater
        run: npx gulp vscode-win32-x64-inno-updater

      - name: Build Windows system setup (.exe)
        run: npx gulp vscode-win32-x64-system-setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows user setup (.exe)
        run: npx gulp vscode-win32-x64-user-setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Windows portable .zip
        shell: pwsh
        continue-on-error: true
        run: |
          # The gulp vscode-win32-x64 task outputs to ../VSCode-win32-x64 (parent of repo)
          # See build/gulpfile.vscode.win32.js — buildPath() returns path.join(path.dirname(root), `VSCode-${process.platform}-${arch}`)
          $portableDir = "../VSCode-win32-x64"
          if (-not (Test-Path $portableDir)) {
            Write-Host "WARNING: Build output directory $portableDir not found — portable zip will not be created"
            # List parent directory contents to aid debugging
            Write-Host "Parent dir contents:"
            Get-ChildItem -Path ".." -Directory | Format-Table Name, LastWriteTime
            exit 0
          }
          # Create a portable zip of the entire VSCode-win32-x64 directory
          # This lets users run Kovix without installer privileges (just extract and run)
          $zipPath = ".build/win32-x64/kovix-win32-x64-${{ github.ref_name }}.zip"
          New-Item -ItemType Directory -Force -Path ".build/win32-x64" | Out-Null
          Compress-Archive -Path "$portableDir/*" -DestinationPath $zipPath -CompressionLevel Optimal
          Write-Host "Created portable zip:"
          Get-ChildItem .build/win32-x64/*.zip | Format-Table Name, Length

      - name: Verify Windows installer integrity
        shell: pwsh
        run: |
          Write-Host "=== Verifying system installer ==="
          $sysExe = Get-ChildItem .build\win32-x64\system-setup\*.exe | Select-Object -First 1
          if (-not $sysExe) {
            Write-Host "ERROR: System installer .exe not found"
            exit 1
          }
          Write-Host "System installer: $($sysExe.Name) ($($sysExe.Length) bytes)"
          # Read PE header to verify it's a valid Windows executable
          $bytes = [System.IO.File]::ReadAllBytes($sysExe.FullName)[0..1]
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Host "ERROR: System installer does not have valid MZ PE header!"
            exit 1
          }
          Write-Host "  PE header: OK (MZ)"
          # Check file size is reasonable (should be > 100 MB)
          if ($sysExe.Length -lt 100MB) {
            Write-Host "ERROR: System installer is suspiciously small: $($sysExe.Length) bytes"
            exit 1
          }
          Write-Host "  Size check: OK ($([math]::Round($sysExe.Length / 1MB, 1)) MB)"

          # Verify user installer if it was built
          $userExe = Get-ChildItem .build\win32-x64\user-setup\*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($userExe) {
            Write-Host ""
            Write-Host "=== Verifying user installer ==="
            Write-Host "User installer: $($userExe.Name) ($($userExe.Length) bytes)"
            $ubytes = [System.IO.File]::ReadAllBytes($userExe.FullName)[0..1]
            if ($ubytes[0] -ne 0x4D -or $ubytes[1] -ne 0x5A) {
              Write-Host "WARNING: User installer does not have valid MZ PE header — skipping"
            } else {
              Write-Host "  PE header: OK (MZ)"
            }
          } else {
            Write-Host "User installer not built (non-critical)"
          }

          # Verify portable zip
          $portableZip = Get-ChildItem .build\win32-x64\*.zip -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($portableZip) {
            Write-Host ""
            Write-Host "=== Verifying portable zip ==="
            Write-Host "Portable zip: $($portableZip.Name) ($($portableZip.Length) bytes)"
            if ($portableZip.Length -lt 100MB) {
              Write-Host "WARNING: Portable zip is suspiciously small"
            } else {
              Write-Host "  Size check: OK ($([math]::Round($portableZip.Length / 1MB, 1)) MB)"
            }
          }

      - name: Verify Kovix.exe inside build output
        shell: pwsh
        continue-on-error: true
        run: |
          # Build output is at ../VSCode-win32-x64 (parent of repo, per gulpfile.vscode.win32.js)
          $kovixExe = "../VSCode-win32-x64/Kovix.exe"
          if (-not (Test-Path $kovixExe)) {
            Write-Host "WARNING: Kovix.exe not found at $kovixExe"
            exit 0
          }
          $exeInfo = Get-Item $kovixExe
          Write-Host "Kovix.exe: $($exeInfo.Length) bytes"
          # Read PE header to check architecture
          $bytes = [System.IO.File]::ReadAllBytes($kovixExe)
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          # 0x8664 = x64 (AMD64), 0x14C = i386 (x86)
          if ($machine -eq 0x8664) {
            Write-Host "  Architecture: x86-64 (AMD64) - OK"
          } elseif ($machine -eq 0x14C) {
            Write-Host "  WARNING: Architecture is x86 (i386) - may not be 64-bit!"
          } else {
            Write-Host "  WARNING: Unknown architecture: 0x$($machine.ToString('X4'))"
          }
          # Verify Kovix.exe has icon (rcedit may have failed silently)
          Write-Host "  Icon verification: Kovix.exe present"

          # Check product.json
          $productJson = "../VSCode-win32-x64/resources/app/product.json"
          if (Test-Path $productJson) {
            $product = Get-Content $productJson | ConvertFrom-Json
            Write-Host "  product.json nameShort: $($product.nameShort)"
            Write-Host "  product.json applicationName: $($product.applicationName)"
            if ($product.nameShort -ne "Kovix") {
              Write-Host "  WARNING: product.json nameShort is not 'Kovix'!"
            }
          }

          # Check package.json version
          $appPkg = "../VSCode-win32-x64/resources/app/package.json"
          if (Test-Path $appPkg) {
            $pkg = Get-Content $appPkg | ConvertFrom-Json
            Write-Host "  package.json version: $($pkg.version)"
            Write-Host "  package.json name: $($pkg.name)"
          }

          # Check workbench.desktop.main.js exists and is non-trivial in size
          $workbench = "../VSCode-win32-x64/resources/app/out/vs/workbench/workbench.desktop.main.js"
          if (Test-Path $workbench) {
            $wbSize = (Get-Item $workbench).Length
            Write-Host "  workbench.desktop.main.js: $([math]::Round($wbSize / 1MB, 2)) MB"
            if ($wbSize -lt 5MB) {
              Write-Host "  WARNING: workbench.desktop.main.js is suspiciously small!"
            }
          }

      - name: Generate SHA256 checksum
        run: |
          $checksumsFile = ".build\win32-x64\checksums-sha256.txt"
          "" | Out-File -FilePath $checksumsFile -Encoding utf8
          Get-ChildItem .build\win32-x64\system-setup\*.exe | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -FilePath $checksumsFile -Append -Encoding utf8
          }
          Get-ChildItem .build\win32-x64\user-setup\*.exe -ErrorAction SilentlyContinue | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -FilePath $checksumsFile -Append -Encoding utf8
          }
          Get-ChildItem .build\win32-x64\*.zip -ErrorAction SilentlyContinue | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -FilePath $checksumsFile -Append -Encoding utf8
          }
          Get-Content $checksumsFile

      - name: Sign (Windows)
        if: env.KOVIX_SIGN_CERT_PATH != ''
        env:
          KOVIX_SIGN_CERT_PATH: ${{ secrets.WINDOWS_CERT_PATH }}
          KOVIX_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: node build/azure-pipelines/common/sign-win32.js

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: kovix-windows
          path: |
            .build/win32-x64/system-setup/*.exe
            .build/win32-x64/user-setup/*.exe
            .build/win32-x64/*.zip
            .build/win32-x64/checksums-sha256.txt

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 180
    env:
      KOVIX_ARCH: x64
      KOVIX_QUALITY: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild native modules against Electron ABI
        shell: bash
        run: node build/lib/rebuild-native-modules.js
      - name: Verify .npmrc target matches resolved Electron version
        shell: bash
        run: node build/lib/verify-npmrc-target.js

      - name: Verify Electron version pin chain (full)
        shell: bash
        run: node build/lib/verify-electron-pins.js

      - name: Verify native modules load against current ABI
        shell: bash
        run: node build/lib/verify-native-modules.js

      - name: Compile
        shell: bash
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile

      - name: Build macOS package
        run: npx gulp vscode-darwin-x64
        timeout-minutes: 180
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Create macOS ZIP archive
        run: |
          set +e
          APP_PATH=""
          # 1. Standard VS Code fork output: VSCode-darwin-x64/*.app
          if [ -d "VSCode-darwin-x64" ]; then
            APP_PATH=$(find VSCode-darwin-x64 -maxdepth 2 -name "*.app" -type d 2>/dev/null | head -1)
          fi
          # 2. Kovix custom output: .build/darwin/x64/*.app
          if [ -z "$APP_PATH" ] && [ -d ".build/darwin/x64" ]; then
            APP_PATH=$(find .build/darwin/x64 -maxdepth 2 -name "*.app" -type d 2>/dev/null | head -1)
          fi
          # 3. Fallback: search any .build/ subdirectory
          if [ -z "$APP_PATH" ] && [ -d ".build" ]; then
            APP_PATH=$(find .build -maxdepth 4 -name "*.app" -type d 2>/dev/null | head -1)
          fi
          # 4. Gulp output in PARENT directory (VS Code's default: path.dirname(root))
          if [ -z "$APP_PATH" ] && [ -d "../VSCode-darwin-x64" ]; then
            APP_PATH=$(find ../VSCode-darwin-x64 -maxdepth 2 -name "*.app" -type d 2>/dev/null | head -1)
          fi
          # 5. Last resort: search whole workspace + parent (slow but thorough)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -maxdepth 4 -name "*.app" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find .. -maxdepth 3 -name "*.app" -type d 2>/dev/null | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "Found macOS app at: $APP_PATH"
            # Zip from the parent directory so the .app is at the archive root
            PARENT_DIR=$(dirname "$APP_PATH")
            APP_NAME=$(basename "$APP_PATH")
            (cd "$PARENT_DIR" && zip -r -y "../../kovix-darwin-x64.zip" "$APP_NAME" 2>&1 || \
             cd "$PARENT_DIR" && zip -r -y "$GITHUB_WORKSPACE/kovix-darwin-x64.zip" "$APP_NAME")
            echo "Created kovix-darwin-x64.zip:"
            ls -la kovix-darwin-x64.zip
          else
            echo "ERROR: Cannot find any .app in workspace"
            echo "=== ls -la ==="
            ls -la
            echo "=== ls .build ==="
            ls -la .build 2>/dev/null || echo "no .build dir"
            echo "=== find .build -maxdepth 5 ==="
            find .build -maxdepth 5 -type d 2>/dev/null | head -30
            echo "=== find any *.app ==="
            find . -maxdepth 6 -name "*.app" 2>/dev/null | head -10
            exit 1
          fi

      - name: Generate SHA256 checksums
        run: |
          shasum -a 256 kovix-darwin-x64.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Sign (macOS)
        if: env.KOVIX_SIGN_IDENTITY != ''
        env:
          KOVIX_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KOVIX_SIGN_CERT_PATH: ${{ secrets.APPLE_CERT_PATH }}
          KOVIX_SIGN_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: node build/darwin/sign.js

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: kovix-macos
          path: |
            kovix-darwin-x64.zip
            checksums-sha256.txt

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      KOVIX_ARCH: x64
      KOVIX_QUALITY: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev rpm libkrb5-dev libx11-dev libxkbfile-dev libsecret-1-0 libsecret-1-dev libgtk-3-0 libgbm1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild native modules against Electron ABI
        shell: bash
        run: node build/lib/rebuild-native-modules.js
      - name: Verify .npmrc target matches resolved Electron version
        shell: bash
        run: node build/lib/verify-npmrc-target.js

      - name: Verify Electron version pin chain (full)
        shell: bash
        run: node build/lib/verify-electron-pins.js

      - name: Verify native modules load against current ABI
        shell: bash
        run: node build/lib/verify-native-modules.js

      - name: Compile
        shell: bash
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run compile

      - name: Build Linux package
        run: npx gulp vscode-linux-x64
        timeout-minutes: 180
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build Linux DEB
        run: |
          npx gulp vscode-linux-x64-prepare-deb
          npx gulp vscode-linux-x64-build-deb
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux RPM
        run: |
          npx gulp vscode-linux-x64-prepare-rpm
          npx gulp vscode-linux-x64-build-rpm
        timeout-minutes: 30
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux tar.gz
        run: |
          npx gulp vscode-linux-x64-build-tar-gz
        timeout-minutes: 30
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        run: |
          cd .build/linux
          sha256sum deb/amd64/**/*.deb > checksums-sha256.txt 2>/dev/null || true
          find . -name "*.rpm" -exec sha256sum {} \; >> checksums-sha256.txt 2>/dev/null || true
          find . -name "*.tar.gz" -exec sha256sum {} \; >> checksums-sha256.txt 2>/dev/null || true
          cat checksums-sha256.txt

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: kovix-linux
          path: |
            .build/linux/deb/amd64/**/*.deb
            .build/linux/**/*.rpm
            .build/linux/**/*.tar.gz
            .build/linux/checksums-sha256.txt

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Generate SHA256 hashes
        run: |
          set -euo pipefail
          mkdir -p out/
          # Each artifact zip extracts with its own internal directory structure
          # (e.g. kovix-windows/system-setup/*.exe, kovix-linux/deb/amd64/deb/*.deb).
          # Flatten everything to a single out/ directory so softprops/action-gh-release
          # can attach every installable file as a top-level release asset.
          for d in kovix-windows kovix-macos kovix-linux; do
            if [ -d "$d" ]; then
              find "$d" -type f \( -name '*.exe' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' \) -exec cp {} out/ \;
            fi
          done
          # Rename the Windows system installer to a stable, versioned name
          # Inno Setup's OutputBaseFilename=KovixSetup so system-setup produces KovixSetup.exe
          if ls out/KovixSetup.exe 1>/dev/null 2>&1; then
            mv out/KovixSetup.exe "out/KovixSetup-x64-${GITHUB_REF_NAME}.exe"
          fi
          # Rename the Windows user installer (also KovixSetup.exe from user-setup dir)
          # The download-artifact action flattens paths, so we need to handle them carefully
          # If both system and user setup produced KovixSetup.exe, only one survives the cp above.
          # Solution: re-extract from the kovix-windows artifact directory structure
          if [ -d "kovix-windows/user-setup" ] && ls kovix-windows/user-setup/*.exe 1>/dev/null 2>&1; then
            cp kovix-windows/user-setup/*.exe "out/KovixUserSetup-x64-${GITHUB_REF_NAME}.exe"
          fi
          # Rename the Linux .deb to a stable name (strip the build-timestamp suffix)
          for f in out/kovix_*_amd64.deb; do
            [ -e "$f" ] || continue
            # Skip already-renamed files
            case "$f" in
              *KovixSetup*|*kovix_${GITHUB_REF_NAME#v}_amd64.deb) continue ;;
            esac
            mv "$f" "out/kovix_${GITHUB_REF_NAME#v}_amd64.deb"
            break
          done
          # Generate checksums.txt with all installable files
          cd out/
          sha256sum *.exe *.zip *.deb 2>/dev/null > checksums.txt || true
          cat checksums.txt
          ls -la

      - name: Verify release assets
        run: |
          set -euo pipefail
          cd out/
          echo "=== Final release assets ==="
          ls -la
          echo ""
          echo "=== Verifying each .exe has valid MZ header ==="
          for f in *.exe; do
            [ -e "$f" ] || continue
            magic=$(xxd -l 2 "$f" | head -1 | awk '{print $2}')
            if [ "$magic" != "4d5a" ]; then
              echo "ERROR: $f does not have valid MZ PE header (got $magic)"
              exit 1
            fi
            echo "  OK: $f ($(stat -c%s "$f") bytes) - valid MZ header"
          done
          echo ""
          echo "=== Verifying each .zip is valid ==="
          for f in *.zip; do
            [ -e "$f" ] || continue
            if unzip -tq "$f" > /dev/null 2>&1; then
              echo "  OK: $f ($(stat -c%s "$f") bytes) - valid zip"
            else
              echo "ERROR: $f is not a valid zip"
              exit 1
            fi
          done
          echo ""
          echo "=== Verifying each .deb is valid ==="
          for f in *.deb; do
            [ -e "$f" ] || continue
            if ar t "$f" > /dev/null 2>&1; then
              echo "  OK: $f ($(stat -c%s "$f") bytes) - valid ar archive"
            else
              echo "ERROR: $f is not a valid .deb"
              exit 1
            fi
          done
          echo ""
          echo "=== All release assets verified ==="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*
          body: |
            ## Kovix Release `${{ github.ref_name }}`

            AI-native development environment with autonomous coding agents.

            ### Downloads

            #### Windows
            - **`KovixSetup-x64-${{ github.ref_name }}.exe`** — System installer (requires admin privileges, installs for all users)
            - **`KovixUserSetup-x64-${{ github.ref_name }}.exe`** — User installer (no admin required, installs for current user only) — *if present*
            - **`kovix-win32-x64-${{ github.ref_name }}.zip`** — Portable build (no installer, just extract and run `Kovix.exe`) — *if present*

            #### macOS
            - **`kovix-darwin-x64.zip`** — App archive

            #### Linux
            - **`kovix_${{ github.ref_name }}_amd64.deb`** — Debian/Ubuntu package

            ### Windows Installation Guide

            #### Option A: System Installer (recommended for power users)
            1. Download `KovixSetup-x64-${{ github.ref_name }}.exe`
            2. If Windows SmartScreen shows "Windows protected your PC":
               - Click **More info**
               - Click **Run anyway**
            3. Follow the installer wizard (requires administrator privileges)
            4. Kovix will be installed to `C:\Program Files\Kovix\`

            #### Option B: User Installer (no admin required)
            1. Download `KovixUserSetup-x64-${{ github.ref_name }}.exe`
            2. Bypass SmartScreen as above
            3. Follow the installer wizard (installs to `%LOCALAPPDATA%\Programs\Kovix\`)

            #### Option C: Portable (no install at all)
            1. Download `kovix-win32-x64-${{ github.ref_name }}.zip`
            2. Right-click → **Extract All...** → choose a folder
            3. Double-click `Kovix.exe` to run

            ### Antivirus / SmartScreen Notice
            Kovix is **not code-signed** (no EV certificate). This means:
            - **Windows SmartScreen** will warn "unrecognized app" — this is normal. Click **More info → Run anyway**.
            - **Windows Defender** or third-party antivirus may show a false positive. Add the Kovix folder to exclusions if needed.
            - The installer SHA256 hash is published in `checksums.txt` — verify the downloaded file matches to confirm integrity.

            ### Verify Download Integrity
            Each release includes SHA256 checksums. Verify with:
            ```bash
            # Linux/macOS
            sha256sum -c checksums.txt

            # Windows PowerShell
            Get-FileHash .\KovixSetup-x64-${{ github.ref_name }}.exe -Algorithm SHA256
            # Compare to the hash in checksums.txt
            ```

            ### Checksums
            See `checksums.txt` in the release assets for SHA256 hashes of all files.

            ### What's New
            See [CHANGELOG.md](https://github.com/Razisafir/KOVIX/blob/main/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
